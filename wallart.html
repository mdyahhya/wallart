<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Wall Art Gallery | Walltone Decors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --green: #2e7d32;
            --green-dark: #1b5e20;
            --black: #1a1a1a;
            --white: #ffffff;
            --gray: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: var(--white);
            color: var(--black);
        }

        /* Navbar Reused */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            color: var(--black);
        }

        /* Hero Slider */
        .hero {
            position: relative;
            height: 70vh;
            margin-top: 70px;
            overflow: hidden;
            background: #000;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            width: 90%;
        }

        .hero-text h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .hero-text p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Gallery */
        .gallery-container { padding: 60px 5%; text-align: center; min-height: 50vh; }
        .section-title { font-weight: 800; font-size: 2rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; position: relative; display: inline-block; }
        .section-title::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 50px; height: 3px; background: var(--green); }

        /* Loader inside section */
        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top: 3px solid var(--green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-size: 0.9rem; font-weight: 600; color: #666; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; margin-top: 40px; }
        
        .gallery-card { position: relative; display: flex; flex-direction: column; transition: transform 0.3s; }
        .gallery-card:hover { transform: translateY(-5px); }
        
        .image-box { aspect-ratio: 1; background: var(--gray); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 15px; cursor: pointer; }
        .image-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; }
        .product-id { font-size: 1rem; font-weight: 800; color: var(--black); letter-spacing: 1px; }

        .download-btn-small { background: #f0f0f0; color: #1a1a1a; width: 34px; height: 34px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .download-btn-small:hover { background: var(--green); color: white; transform: scale(1.1); }
        .download-btn-small svg { width: 14px; height: 14px; }

        /* Modal for Preview */
        .preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-img { max-width: 100%; max-height: 85vh; border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: 30px; right: 30px; color: white; font-size: 3rem; cursor: pointer; }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">WALLTONE</a>
        <a href="index.html" style="text-decoration: none; color: var(--green); font-weight:600;">← Back to Home</a>
    </nav>


    <header class="hero">

        <img src="art.jpg" class="hero-img" alt="Metal Wall Art">
        <div class="hero-text">
            <h1>Metal Wall Art</h1>
            <p>Elevate your space with handcrafted metal masterpieces</p>
        </div>
    </header>

    <main class="gallery-container">
        <h2 class="section-title">Exclusive Collection</h2>
        <div class="loading-container" id="loadingContainer">
            <div class="spinner"></div>
            <div class="loading-text">Loading models...</div>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </main>


    <div class="preview-modal" id="previewModal">
        <span class="close-modal" id="closeModal">&times;</span>
        <img src="" class="preview-img" id="previewImg">
    </div>

    <script>
        const SUPABASE_URL = 'https://sujqcavxkoxkoxwvlzci.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1anFjYXZ4a294a294d3ZsemNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDY2MjgsImV4cCI6MjA4ODE4MjYyOH0.ZBMF7adIuR_QR4pOME2UPRHUdnjPbljkt629vK7mJgY';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);


        async function loadArt() {
            const loader = document.getElementById('loadingContainer');
            try {
                const { data, error } = await db.from('products').select('*').eq('category', 'wall_art').order('product_no', { ascending: true });
                if (error) throw error;
                
                const grid = document.getElementById('galleryGrid');
                data.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'gallery-card';
                    card.innerHTML = `
                        <div class="image-box" onclick="openPreview('${p.image_url}')">
                            <img src="${p.image_url}" alt="${p.name}" crossorigin="anonymous">
                        </div>
                        <div class="info-row">
                            <div class="product-id">${p.product_no}</div>
                            <button class="download-btn-small" onclick="downloadWithWatermark('${p.image_url}', '${p.product_no}')" title="Download">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
            } finally {
                loader.style.display = 'none';
            }
        }


        function openPreview(url) {
            document.getElementById('previewImg').src = url;
            document.getElementById('previewModal').classList.add('active');
        }

        document.getElementById('closeModal').onclick = () => document.getElementById('previewModal').classList.remove('active');

        function downloadWithWatermark(url, no) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = url;
            img.onload = function () {
                const canvas = document.createElement("canvas");
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);

                const size = Math.floor(canvas.width * 0.045);
                ctx.font = `800 ${size}px Montserrat, sans-serif`;
                ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 12;
                ctx.textAlign = "right";

                ctx.fillText(no, canvas.width - (size), size * 1.5);
                ctx.font = `800 ${size * 0.7}px Montserrat, sans-serif`;
                ctx.fillText("walltone.in", canvas.width - (size), canvas.height - (size));

                const link = document.createElement("a");
                link.download = `WALLTONE_${no}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.95);
                link.click();
            }
        }

        loadArt();
    </script>
</body>

</html>
