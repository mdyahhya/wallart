<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Wall Art Gallery | Walltone Decors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --green: #2e7d32;
            --green-dark: #1b5e20;
            --black: #1a1a1a;
            --white: #ffffff;
            --gray: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: var(--white);
            color: var(--black);
        }

        /* Navbar Reused */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            color: var(--black);
        }

        /* Hero Slider */
        .hero {
            position: relative;
            height: 70vh;
            margin-top: 70px;
            overflow: hidden;
            background: #000;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            width: 90%;
        }

        .hero-text h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .hero-text p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Gallery */
        .gallery-container {
            padding: 60px 5%;
            text-align: center;
        }

        .section-title {
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--green);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .gallery-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: var(--gray);
            aspect-ratio: 1;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .gallery-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: scale 0.6s ease;
        }

        .gallery-card:hover img {
            scale: 1.1;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
            color: white;
            transition: opacity 0.3s;
        }

        .product-no {
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .download-btn {
            background: var(--white);
            color: var(--black);
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: var(--green);
            color: white;
            transform: scale(1.05);
        }

        .download-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Modal for Preview */
        .preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-img { max-width: 100%; max-height: 85vh; border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: 30px; right: 30px; color: white; font-size: 3rem; cursor: pointer; }

        /* Spinner */
        .loading-overlay { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 4px solid #eee; border-top: 4px solid var(--green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-weight: 600; color: var(--black); letter-spacing: 1px; }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .card-overlay {
                padding: 15px;
            }

            .product-name {
                font-size: 1rem;
            }

            .hero {
                height: 50vh;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">WALLTONE</a>
        <a href="index.html" style="text-decoration: none; color: var(--green); font-weight:600;">← Back to Home</a>
    </nav>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading models...</div>
    </div>

    <header class="hero">

        <img src="art.jpg" class="hero-img" alt="Metal Wall Art">
        <div class="hero-text">
            <h1>Metal Wall Art</h1>
            <p>Elevate your space with handcrafted metal masterpieces</p>
        </div>
    </header>

    <main class="gallery-container">
        <h2 class="section-title">Exclusive Collection 🎨</h2>
        <div class="gallery-grid" id="galleryGrid">
            <!-- Products loaded via JS -->
        </div>
    </main>

    <div class="preview-modal" id="previewModal">
        <span class="close-modal" id="closeModal">&times;</span>
        <img src="" class="preview-img" id="previewImg">
    </div>

    <script>
        const SUPABASE_URL = 'https://sujqcavxkoxkoxwvlzci.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1anFjYXZ4a294a294d3ZsemNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDY2MjgsImV4cCI6MjA4ODE4MjY2Mjh9.ZBMF7adIuR_QR4pOME2UPRHUdnjPbljkt629vK7mJgY';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);


        async function loadArt() {
            const overlay = document.getElementById('loadingOverlay');
            try {
                const { data, error } = await db.from('products').select('*').eq('category', 'wall_art').order('product_no', { ascending: true });
                if (error) throw error;
                
                const grid = document.getElementById('galleryGrid');
                data.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'gallery-card';
                    card.onclick = () => openPreview(p.image_url);
                    card.innerHTML = `
                        <img src="${p.image_url}" alt="${p.name}" crossorigin="anonymous">
                        <div class="card-overlay">
                            <div class="product-no">${p.product_no}</div>
                            <div class="product-name">${p.name}</div>
                            <button class="download-btn" onclick="event.stopPropagation(); downloadWithWatermark('${p.image_url}', '${p.product_no}')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
            } finally {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }
        }

        function openPreview(url) {
            document.getElementById('previewImg').src = url;
            document.getElementById('previewModal').classList.add('active');
        }

        document.getElementById('closeModal').onclick = () => document.getElementById('previewModal').classList.remove('active');

        function downloadWithWatermark(url, no) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = url;
            img.onload = function () {
                const canvas = document.createElement("canvas");
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);

                const size = Math.floor(canvas.width * 0.045);
                ctx.font = `800 ${size}px Montserrat, sans-serif`;
                ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 12;
                ctx.textAlign = "right";

                ctx.fillText(no, canvas.width - (size), size * 1.5);
                ctx.font = `800 ${size * 0.7}px Montserrat, sans-serif`;
                ctx.fillText("walltone.in", canvas.width - (size), canvas.height - (size));

                const link = document.createElement("a");
                link.download = `WALLTONE_${no}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.95);
                link.click();
            }
        }

        loadArt();
    </script>
</body>

</html>
